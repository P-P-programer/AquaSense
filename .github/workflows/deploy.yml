name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build assets
        env:
          VITE_ENABLE_PWA: "true"
          VITE_APP_ENV: "production"
          VITE_SW_VERSION: ${{ github.sha }}
        run: |
          npm ci
          npm run build

      - name: Upload build to temp folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          source: "public/build/*"
          target: "/home/u633781435/domains/aquasense.sbs/AquaSense/public/build-new/"
          strip_components: 2

      - name: Atomic swap build folders
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u633781435/domains/aquasense.sbs/AquaSense/public
            rm -rf build-old
            if [ -d build ]; then mv build build-old; fi
            mv build-new build
            rm -rf build-old
            echo "Build swap atómico completado"

  deploy:
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u633781435/domains/aquasense.sbs/AquaSense
            git pull origin main
            rm -f public/hot ../public_html/hot
            composer install --no-dev --classmap-authoritative
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            mkdir -p /home/u633781435/domains/aquasense.sbs/public_html/build
            rm -rf /home/u633781435/domains/aquasense.sbs/public_html/build/*
            cp -a /home/u633781435/domains/aquasense.sbs/AquaSense/public/build/. /home/u633781435/domains/aquasense.sbs/public_html/build/
            echo "Deploy backend + sync frontend completado"
