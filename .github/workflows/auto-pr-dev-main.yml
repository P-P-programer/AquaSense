name: Auto PR dev -> main

on:
  push:
    branches: [ dev ]

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or keep PR dev->main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PERSONAL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const head = `${owner}:dev`;
            const base = "main";

            const existing = await github.rest.pulls.list({
              owner, repo, state: "open", head, base
            });

            if (existing.data.length === 0) {
              const pr = await github.rest.pulls.create({
                owner, repo,
                head: "dev",
                base: "main",
                title: "chore: merge dev into main",
                body: "PR automático creado al hacer push en dev."
              });
              core.info(`PR creado: #${pr.data.number}`);
            } else {
              core.info("Ya existe un PR abierto dev -> main.");
            }